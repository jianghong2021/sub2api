<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大灰狼</title>
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9fafb;
        z-index: 9999;
      }
      .dark #app-loading { background: #020617; }
      .loading-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 3px solid rgba(139, 92, 246, 0.15);
        border-top-color: #8b5cf6;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin {
        to { transform: rotate(360deg); }
      }
      .loading-text {
        font-size: 0.875rem;
        color: #6b7280;
        font-family: system-ui, -apple-system, sans-serif;
        letter-spacing: 0.05em;
      }
      .dark .loading-text { color: #64748b; }
    </style>
  </head>
  <body>
    <script>
      (function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.classList.add('dark');else if(t==='light')document.documentElement.classList.remove('dark');else if(window.matchMedia('(prefers-color-scheme: dark)').matches)document.documentElement.classList.add('dark')})()
    </script>
    <div id="app">
      <div id="app-loading">
        <div class="loading-inner">
          <div class="loading-spinner"></div>
          <div class="loading-text">Loading...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
